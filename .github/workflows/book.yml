name: Book classes

on:
  workflow_dispatch:
    inputs:
      class_ids:
        description: "Comma-separated Wellhub slot IDs to book (copy from email digest)"
        required: true
        type: string

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Book selected classes
        env:
          WELLHUB_REFRESH_TOKEN:  ${{ secrets.WELLHUB_REFRESH_TOKEN }}
        run: python book.py --ids "${{ inputs.class_ids }}"

      - name: Upload booking results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-results
          path: |
            booking_results.json
            booking_failures.txt
          if-no-files-found: ignore
