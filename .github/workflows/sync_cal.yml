name: Sync Wellhub → Calendar

on:
  schedule:
    - cron: "30 12 * * *"   # 8:30am ET daily
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Book selected classes"]
    types: [completed]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit calendar.ics back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Generate calendar.ics
        env:
          WELLHUB_REFRESH_TOKEN: ${{ secrets.WELLHUB_REFRESH_TOKEN }}
        run: python sync_cal.py

      - name: Commit updated calendar.ics
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/calendar.ics
          git diff --cached --quiet || git commit -m "chore: update calendar.ics [skip ci]"
          git push
