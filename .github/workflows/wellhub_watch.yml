name: Wellhub change watcher

on:
  schedule:
    # Every 5 min between 8am–10pm ET (bumped up for Apr 24 spot watch; revert to 0,15,30,45 after)
    - cron: "*/5 12-23,0-2 * * *"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: tracker-state-${{ github.run_id }}
          restore-keys: |
            tracker-state-

      - name: Check for Wellhub changes + auto-book
        env:
          WELLHUB_REFRESH_TOKEN:   ${{ secrets.WELLHUB_REFRESH_TOKEN }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          APP_REPO:                ${{ secrets.APP_REPO }}
          GOOGLE_CALENDAR_ICS_URL: ${{ secrets.GOOGLE_CALENDAR_ICS_URL }}
          # Auto-booking active from Apr 25 onward (when new classes go live).
          # Set to a past date or remove to always enable.
          AUTO_BOOK_START_DATE: "2026-04-25"
        run: python check_wellhub.py

      # ── Spot watcher: Apr 24 tomorrow — full classes 9am–3pm ──────────────
      # Remove or comment out after Apr 24.
      - name: Watch for open spots (Apr 24, full classes 9am–3pm)
        env:
          WELLHUB_REFRESH_TOKEN: ${{ secrets.WELLHUB_REFRESH_TOKEN }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:         ${{ secrets.SMTP_PASSWORD }}
          WATCH_DATE:            "2026-04-24"
          WATCH_AFTER_HOUR:      "9"
          WATCH_DONE_BY_HOUR:    "15"
          WATCH_DONE_BY_MIN:     "50"
          WATCH_EXCLUDE:         "focus50"
          WATCH_EXTRA_PARTNERS:  "85e3823f-8006-4939-91c9-5485a89c5f55:NoLita,5489fe69-4649-4214-9258-310e52586c74:Nomad"
          NOTIFY_SMS:            "5167105653@vtext.com"
        run: python watch_spots.py
