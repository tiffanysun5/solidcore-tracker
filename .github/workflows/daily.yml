name: Daily class tracker

on:
  schedule:
    # 6 AM ET = 10:00 UTC (EDT). GitHub scheduler is unreliable so retry at
    # 11:00 and 12:00 UTC too — main.py's dedup guard ensures only one email/day.
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Send email even if no new classes"
        type: boolean
        default: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: tracker-state-${{ github.run_id }}
          restore-keys: |
            tracker-state-

      - name: Run tracker
        env:
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          APP_REPO:                ${{ secrets.APP_REPO }}
          WELLHUB_REFRESH_TOKEN:   ${{ secrets.WELLHUB_REFRESH_TOKEN }}
          GOOGLE_CALENDAR_ICS_URL: ${{ secrets.GOOGLE_CALENDAR_ICS_URL }}
        run: python main.py
